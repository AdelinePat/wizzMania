services:
  # ============================================
  # MySQL Database
  # ============================================
  mysql-db:
    image: mysql:9.6.0-oraclelinux9
    container_name: wizzmania-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - type: volume
        source: mysql-data
        target: /var/lib/mysql
      - type: bind
        source: ./init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
      - type: bind
        source: ./queries.sql
        target: /queries.sql
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  # ============================================
  # C++ Server (Development)
  # ============================================
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: wizzmania-server
    environment:
      # Database connection (service name = mysql-db)
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Server configuration
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - "8888:8888"
    volumes:
      # Mount source code (rebuild on changes)
      - type: bind
        source: ./server
        target: /app/server
      - type: bind
        source: ./common
        target: /app/common
      - type: bind
        source: ./tests/server
        target: /app/tests
    depends_on:
      - mysql-db
    command: ["./build-server.sh"]
    restart: unless-stopped

  # ============================================
  # Qt Client Builder (Windows Cross-Compile)
  # ============================================
  client-builder:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: wizzmania-client-builder
    volumes:
      - type: bind
        source: ./client
        target: /app/client
      - type: bind
        source: ./common
        target: /app/common
    # Only run when explicitly called
    profiles:
      - build

volumes:
  mysql-data: