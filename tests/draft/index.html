<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WizzMania</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ===================== RESET & BASE ===================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-void: #0d0f14;
      --bg-base: #13151c;
      --bg-surface: #1a1d27;
      --bg-elevated: #22263a;
      --bg-hover: #2a2f45;
      --accent: #7c6af7;
      --accent-bright: #9d8fff;
      --accent-dim: #3d3580;
      --text-primary: #e8e9f0;
      --text-secondary: #8b90a8;
      --text-muted: #4a4f6a;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --border: rgba(124, 106, 247, 0.15);
      --sidebar-w: 260px;
      --font-ui: 'DM Sans', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg-void);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ===================== LOGIN SCREEN ===================== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-void);
      position: relative;
      overflow: hidden;
    }

    #login-screen::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124, 106, 247, 0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-bright);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-logo span {
      color: var(--text-muted);
    }

    .login-tagline {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .login-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--accent-bright);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    #login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }

    /* ===================== APP LAYOUT ===================== */
    #app-screen {
      display: none;
      height: 100vh;
      flex-direction: row;
    }

    #app-screen.visible {
      display: flex;
    }

    /* ===================== SIDEBAR ===================== */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--bg-base);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .app-name {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-bright);
      letter-spacing: -0.3px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-elevated);
      border-radius: 20px;
      padding: 5px 10px 5px 6px;
      max-width: 100%;
      overflow: hidden;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-bright);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 2px;
    }

    .sidebar-section {
      padding: 16px 16px 4px;
    }

    .sidebar-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin: 1px 6px;
      position: relative;
    }

    .sidebar-item:hover {
      background: var(--bg-hover);
    }

    .sidebar-item.active {
      background: var(--accent-dim);
    }

    .sidebar-item.active .item-name {
      color: var(--accent-bright);
    }

    .item-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      color: var(--text-secondary);
    }

    .sidebar-item.active .item-icon {
      background: var(--accent);
      color: #fff;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-preview {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      flex-shrink: 0;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }

    .logout-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 13px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(248, 113, 113, 0.1);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ===================== MAIN CHAT AREA ===================== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-void);
    }

    #chat-header {
      padding: 0 24px;
      height: 58px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-base);
      flex-shrink: 0;
    }

    .chat-header-icon {
      font-size: 18px;
    }

    .chat-header-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chat-header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .ws-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .ws-status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .ws-status-dot.error {
      background: var(--danger);
    }

    /* ===================== MESSAGES ===================== */
    #messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #messages-container::-webkit-scrollbar {
      width: 6px;
    }

    #messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages-container::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 3px;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      margin: 4px 0;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 75%;
    }

    .msg-row.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.received {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-bright);
      flex-shrink: 0;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .msg-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg-sender {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .msg-row.sent .msg-sender {
      text-align: right;
    }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      max-width: 100%;
    }

    .msg-row.sent .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.received .msg-bubble {
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.system .msg-bubble {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
      padding: 2px 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 4px;
      align-self: flex-end;
    }

    .msg-row.sent .msg-time {
      text-align: right;
    }

    /* ===================== INPUT AREA ===================== */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-base);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
    }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      resize: none;
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    #messageInput:disabled {
      cursor: not-allowed;
    }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      font-size: 16px;
    }

    .send-btn:hover {
      background: var(--accent-bright);
    }

    .send-btn:active {
      transform: scale(0.93);
    }

    .send-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    /* ===================== EMPTY STATES ===================== */
    .empty-sidebar {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    .no-channel-selected {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .no-channel-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .no-channel-text {
      font-size: 15px;
    }

    /* ===================== SEPARATOR ===================== */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      color: var(--text-muted);
      font-size: 11px;
    }

    .date-sep::before,
    .date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* <!-- ===================== INVITATION ===================== --> */
    .invitation-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .invitation-title {
      font-weight: 600;
      font-size: 13px;
    }

    .invitation-from,
    .invitation-members {
      font-size: 11px;
      color: var(--text-muted);
    }

    .invitation-actions {
      display: flex;
      gap: 6px;
    }

    .inv-btn {
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .accept-btn {
      background: var(--accent);
      color: white;
    }

    .reject-btn {
      background: var(--error, #e05);
      color: white;
    }
  </style>
</head>

<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">Wizz<span>Mania</span></div>
      <div class="login-tagline">Sign in to continue</div>

      <label class="field-label" for="username">Username</label>
      <input class="login-input" type="text" id="username" placeholder="your username" value="alice"
        autocomplete="off" />

      <label class="field-label" for="password">Password</label>
      <input class="login-input" type="password" id="password" placeholder="••••••••" value="hash" />

      <button class="login-btn" id="loginBtn">Connect</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app-screen">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="app-name">WizzMania</div>
      </div>

      <div class="sidebar-header" style="border-top: none; padding-top: 12px;">
        <div class="user-pill">
          <div class="user-avatar" id="user-avatar-initials">?</div>
          <div class="user-name" id="sidebar-username">...</div>
        </div>
      </div>

      <div class="sidebar-scroll" id="sidebar-scroll">
        <!-- CHANNELS -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">Channels</div>
        </div>
        <div id="channels-list"></div>

        <!-- CONTACTS -->
        <div class="sidebar-section" style="margin-top: 8px;">
          <div class="sidebar-section-title">Contacts</div>
        </div>
        <div id="contacts-list"></div>
      </div>
      <!-- INVITATION -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Invitations</div>
        <div id="invitations-list"></div>
      </div>
      <!-- OUTGOING INVITATION -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Sent Invitations</div>
        <div id="outgoing-invitations-list"></div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">Sign out</button>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main">

      <!-- HEADER -->
      <div id="chat-header">
        <div class="chat-header-icon" id="chat-icon">#</div>
        <div>
          <span class="chat-header-name" id="chat-title">Select a channel</span>
          <span class="chat-header-sub" id="chat-sub"></span>
        </div>
        <div class="ws-status-dot" id="ws-dot" title="Disconnected"></div>
      </div>

      <!-- MESSAGES -->
      <div id="messages-container"></div>

      <!-- INPUT -->
      <div id="input-area">
        <div class="input-wrap">
          <input id="messageInput" type="text" placeholder="Message..." disabled />
          <button class="send-btn" id="sendBtn" disabled title="Send">➤</button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>

</html>
